services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nagaoka_tech_coop
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d nagaoka_tech_coop"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/nagaoka_tech_coop?schema=public
      DIRECT_DATABASE_URL: postgresql://app:app@db:5432/nagaoka_tech_coop?schema=public
      COOKIE_SECURE: "false"
      PASSWORD_RESET_DEBUG: "true"
      ALLOW_DB_PUSH_FALLBACK: "true"
      SEED_ON_BOOT: "true"
      PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/public/uploads

volumes:
  postgres_data:
  uploads_data:
